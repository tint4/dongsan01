<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>랭킹 커뮤니티</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="community-shell">
      <nav class="page-nav" aria-label="페이지 이동">
        <a class="home-back-link" href="./index.html">메인페이지로 돌아가기</a>
      </nav>

      <header class="community-header">
        <div>
          <p class="community-eyebrow">커뮤니티</p>
          <h1>랭킹</h1>
        </div>
        <div class="community-login">
          <span id="memberStatus">비회원</span>
          <button id="loginToggle" type="button">회원 로그인</button>
          <button id="joinBtn" type="button">회원가입</button>
        </div>
      </header>

      <section id="authPanel" class="community-auth-panel" hidden>
        <form id="loginForm" class="community-auth-form" hidden>
          <h2>회원 로그인</h2>
          <label>
            <span>아이디</span>
            <input id="loginUserId" type="text" autocomplete="username" />
          </label>
          <label>
            <span>비밀번호</span>
            <input id="loginPassword" type="password" autocomplete="current-password" />
          </label>
          <div class="community-actions">
            <button type="submit">로그인</button>
            <button id="loginCancelBtn" type="button">취소</button>
          </div>
        </form>

        <form id="signupForm" class="community-auth-form" hidden>
          <h2>회원가입</h2>
          <label>
            <span>아이디</span>
            <input id="signupUserId" type="text" autocomplete="username" placeholder="영문/숫자 4자 이상" />
          </label>
          <label>
            <span>닉네임</span>
            <input id="signupDisplayName" type="text" autocomplete="nickname" />
          </label>
          <label>
            <span>비밀번호</span>
            <input id="signupPassword" type="password" autocomplete="new-password" placeholder="6자 이상" />
          </label>
          <div class="community-actions">
            <button type="submit">가입하기</button>
            <button id="signupCancelBtn" type="button">취소</button>
          </div>
        </form>
        <p id="authMessage" class="status" role="status"></p>
      </section>

      <section class="community-layout">
        <aside class="community-sidebar" aria-label="대분류">
          <button class="category-tab active" type="button" data-category="빵류">빵류</button>
          <button class="category-tab" type="button" data-category="밥류">밥류</button>
          <button class="category-tab" type="button" data-category="면류">면류</button>
          <button class="category-tab" type="button" data-category="고기류">고기류</button>
          <button class="category-tab" type="button" data-category="국물류">국물류</button>
          <button class="category-tab" type="button" data-category="분식류">분식류</button>
          <button class="category-tab" type="button" data-category="자유게시판">자유게시판</button>
        </aside>

        <section class="community-main">
          <div class="community-board-head">
            <div>
              <h2 id="boardTitle">빵류</h2>
              <p id="boardSummary">단팥빵 랭킹 차트</p>
            </div>
            <button id="newRankingBtn" type="button">신규등록</button>
            <button id="newPostBtn" type="button" hidden>글쓰기</button>
          </div>

          <nav id="subCategoryList" class="subcategory-list" aria-label="소분류"></nav>

          <form id="rankingForm" class="community-write-form ranking-form" hidden>
            <p class="ranking-form-help">상점명 입력 또는 공유 URL은 네이버 지도 기준으로 넣어주세요.</p>
            <label>
              <span>상점명</span>
              <input id="shopNameInput" type="text" autocomplete="off" />
            </label>
            <label>
              <span>네이버 지도 URL</span>
              <input id="mapUrlInput" type="url" autocomplete="off" placeholder="네이버 지도 공유 링크" />
            </label>
            <label>
              <span>맛 점수</span>
              <select id="tasteScoreInput"></select>
            </label>
            <label>
              <span>가격 점수</span>
              <select id="priceScoreInput"></select>
            </label>
            <div class="community-actions">
              <button type="submit">점수 등록</button>
              <button id="rankingCancelBtn" type="button">취소</button>
            </div>
          </form>

          <p id="rankingMessage" class="status" role="status"></p>

          <section id="rankingSection">
            <div class="table-wrap community-table-wrap">
            <table class="community-table ranking-table">
              <thead>
                <tr>
                  <th>순위 <span class="rank-sort-group"><button class="rank-sort-btn" type="button" data-sort="rank" data-label="순위" data-direction="desc" aria-label="순위 높은순 정렬">▼</button></span></th>
                  <th>상점명</th>
                  <th>지도</th>
                  <th class="total-score-head">총점 <span class="rank-sort-group"><button class="rank-sort-btn active" type="button" data-sort="totalScore" data-label="총점" data-direction="desc" aria-label="총점 높은순 정렬" aria-pressed="true">▼</button></span></th>
                  <th>맛 합산 <span class="rank-sort-group"><button class="rank-sort-btn" type="button" data-sort="tasteScore" data-label="맛 합산" data-direction="desc" aria-label="맛 합산 높은순 정렬">▼</button></span></th>
                  <th>가격 합산 <span class="rank-sort-group"><button class="rank-sort-btn" type="button" data-sort="priceScore" data-label="가격 합산" data-direction="desc" aria-label="가격 합산 높은순 정렬">▼</button></span></th>
                  <th>점수 횟수</th>
                  <th>점수주기</th>
                </tr>
              </thead>
              <tbody id="rankingList"></tbody>
            </table>
            </div>
          </section>

          <section id="postSection" hidden>
            <form id="postForm" class="community-write-form" hidden>
              <label>
                <span>제목</span>
                <input id="postTitleInput" type="text" autocomplete="off" />
              </label>
              <label>
                <span>내용</span>
                <textarea id="postBodyInput" rows="6"></textarea>
              </label>
              <div class="community-actions">
                <button type="submit">등록</button>
                <button id="postCancelBtn" type="button">취소</button>
              </div>
            </form>

            <div class="table-wrap community-table-wrap">
              <table class="community-table board-table">
                <thead>
                  <tr>
                    <th>번호</th>
                    <th>제목</th>
                    <th>작성자</th>
                    <th>조회</th>
                    <th>댓글</th>
                    <th>작성일</th>
                  </tr>
                </thead>
                <tbody id="postList"></tbody>
              </table>
            </div>

            <article id="postDetail" class="community-post-detail" hidden>
              <div class="community-detail-head">
                <span id="postDetailMeta"></span>
                <h3 id="postDetailTitle"></h3>
                <p id="postDetailInfo"></p>
              </div>
              <div id="postDetailBody" class="community-detail-body"></div>
              <section class="community-comments">
                <h4>댓글</h4>
                <ul id="commentList"></ul>
                <form id="commentForm" class="comment-form">
                  <input id="commentInput" type="text" autocomplete="off" placeholder="회원만 댓글을 쓸 수 있습니다." />
                  <button type="submit">댓글등록</button>
                </form>
              </section>
            </article>
          </section>
        </section>
      </section>
    </main>

    <script src="./community-app.js"></script>
  </body>
</html>
