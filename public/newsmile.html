<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>경주 새천년미소 시간표 이미지 다운로드</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <nav class="page-nav" aria-label="페이지 이동">
        <a class="home-back-link" href="./index.html">메인페이지로 돌아가기</a>
      </nav>

      <section class="search-panel" aria-label="경주 새천년미소 버스 검색">
        <div>
          <p class="blog-name">대중교통과 여행하기</p>
          <h1>경주 새천년미소 시간표 이미지 다운로드</h1>
        </div>

        <form id="newsmileForm" class="buspia-search-form">
          <label>
            <span>버스번호 또는 출발지/도착지</span>
            <input id="newsmileKeyword" type="text" autocomplete="off" placeholder="예: 10, 700, 경주역, 불국사" required />
          </label>
          <button type="submit">검색하기</button>
        </form>
        <p id="status" class="status" role="status"></p>
      </section>

      <section class="buspia-quick-panel" aria-label="경주 새천년미소 빠른 선택">
        <div id="newsmileQuickGrid" class="buspia-quick-grid"></div>
      </section>

      <section id="newsmileResults" class="buspia-results" aria-label="경주 새천년미소 검색 결과"></section>

      <section class="result-tools">
        <button id="openNaverBtn" type="button" disabled>네이버 글쓰기 열기</button>
      </section>

      <article id="blogPost" class="blog-post">
        <p class="empty">버스번호 또는 출발지/도착지를 검색하면 시간표 이미지와 블로그용 표가 만들어집니다.</p>
      </article>
      <nav class="page-nav bottom-page-nav" aria-label="하단 페이지 이동">
        <a class="home-back-link" href="./index.html">메인페이지로 돌아가기</a>
      </nav>
    </main>

    <script src="./newsmile-app.js"></script>
  </body>
</html>
